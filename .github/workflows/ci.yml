name: CI

on:
  push:
    paths:
      - "mcp-servers/gmail/**"
  pull_request:
    paths:
      - "mcp-servers/gmail/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-servers/gmail

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-servers/gmail/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test
